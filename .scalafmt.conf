version = "3.8.6"
runner.dialect = scala3
maxColumn = 120
align {
  preset = none
  stripMargin = true
}
assumeStandardLibraryStripMargin = true
rewrite.rules = [RedundantBraces, SortImports]
trailingCommas = "always"

rewrite.imports {
  groups = [
    ["todos\\..*"]                        # собственные пакеты
    ["zio\\..*", "izumi\\..*", "scala\\..*", "sttp\\..*"]            # библиотеки ZIO
    ["java\\..*", "javax\\..*"] # стандартная библиотека
  ]
}